name: Daily Sync from eooce/Cloudflare-proxy

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get upstream latest SHA
        id: get_sha
        run: |
          sha=$(curl -s https://api.github.com/repos/eooce/Cloudflare-proxy/commits/main \
            | jq -r '.sha')
          echo "sha=$sha" >> $GITHUB_OUTPUT

      - name: Check update needed
        id: check
        run: |
          if [ ! -s version.txt ]; then
            echo "need_update=true" >> $GITHUB_OUTPUT
          elif [ "$(cat version.txt)" != "${{ steps.get_sha.outputs.sha }}" ]; then
            echo "need_update=true" >> $GITHUB_OUTPUT
          else
            echo "need_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync files
        if: steps.check.outputs.need_update == 'true'
        run: |
          curl -s https://raw.githubusercontent.com/eooce/Cloudflare-proxy/main/_worker.js -o _worker.js
          curl -s https://raw.githubusercontent.com/eooce/Cloudflare-proxy/main/README.md -o README.md

          echo "${{ steps.get_sha.outputs.sha }}" > version.txt

      - name: Commit & push changes
        if: steps.check.outputs.need_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add _worker.js README.md version.txt

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "sync: update worker + README to ${{ steps.get_sha.outputs.sha }}"
          git push
