name: Smart Mirror Bot (eooce/Cloudflare-proxy)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ==============================
      # 🧠 获取 upstream 最新 commit
      # ==============================
      - name: Get upstream commit info
        id: upstream
        run: |
          data=$(curl -s https://api.github.com/repos/eooce/Cloudflare-proxy/commits/main)

          sha=$(echo "$data" | jq -r '.sha')
          msg=$(echo "$data" | jq -r '.commit.message' | head -c 120)

          echo "sha=$sha" >> $GITHUB_OUTPUT
          echo "msg=$msg" >> $GITHUB_OUTPUT

      # ==============================
      # 📦 判断是否需要更新
      # ==============================
      - name: Check update
        id: check
        run: |
          if [ ! -s version.txt ]; then
            echo "need_update=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          local_sha=$(cat version.txt)
          if [ "$local_sha" != "${{ steps.upstream.outputs.sha }}" ]; then
            echo "need_update=true" >> $GITHUB_OUTPUT
          else
            echo "need_update=false" >> $GITHUB_OUTPUT
          fi

      # ==============================
      # 📥 智能同步文件（防炸版）
      # ==============================
      - name: Smart sync files
        if: steps.check.outputs.need_update == 'true'
        run: |
          set -e

          BASE_URL="https://raw.githubusercontent.com/eooce/Cloudflare-proxy/main"

          # 文件清单（可扩展）
          FILES=(
            "_worker.js"
            "README.md"
          )

          for file in "${FILES[@]}"; do
            echo "Downloading $file..."

            if curl -fsSL "$BASE_URL/$file" -o "$file"; then
              echo "✔ $file updated"
            else
              echo "⚠ $file missing upstream, keep local version"
            fi
          done

          # 更新版本记录
          echo "${{ steps.upstream.outputs.sha }}" > version.txt

      # ==============================
      # 🧾 生成变更提交
      # ==============================
      - name: Commit changes
        if: steps.check.outputs.need_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes detected, skip commit"
            exit 0
          fi

          git commit -m "🪞 mirror sync: ${{ steps.upstream.outputs.sha }}

          upstream:
          ${{ steps.upstream.outputs.msg }}"

          git push

      # ==============================
      # 🧾 可选：运行日志输出
      # ==============================
      - name: Summary
        run: |
          echo "Mirror sync completed"
          echo "Upstream SHA: ${{ steps.upstream.outputs.sha }}"
